connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/workforce
# Local dev uses the superuser for reliable startup. In production, point this at
# the least-privilege analyst_reader role (created by bootstrap_roles()).
connection-user=postgres
connection-password=changeme

# dbt computes rates with round(), producing PostgreSQL numeric columns that have
# no declared precision/scale. Trino's JDBC connector drops such columns by default
# (unsupported-type-handling=IGNORE), which silently hid attrition_rate_pct,
# rolling_12m_attrition_rate_pct, application_to_hire_days_avg, etc. from the
# dashboard. Map unbounded numeric -> decimal(38, 6) so all columns are visible.
decimal-mapping=ALLOW_OVERFLOW
decimal-rounding-mode=HALF_UP
decimal-default-scale=6
